name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject commit SHA as cache-bust version
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "Replacing __VERSION__ with $SHORT_SHA"
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            -exec sed -i "s/__VERSION__/$SHORT_SHA/g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
